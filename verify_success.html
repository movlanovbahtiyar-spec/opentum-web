<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-posta Doğrulandı | Opentum</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Instrument Sans', -apple-system, sans-serif;
            background: linear-gradient(135deg, #021B15 0%, #000a06 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F4FBF7;
        }
        .card {
            background: rgba(6, 36, 28, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.15);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon {
            color: #10B981;
            font-size: 40px;
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #10B981;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        p {
            color: #819B91;
            line-height: 1.6;
            margin-bottom: 32px;
            font-size: 15px;
        }
        .btn {
            background: #10B981;
            color: #021B15;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Instrument+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <span class="icon">✓</span>
        </div>
        <h1>E-posta Doğrulandı!</h1>
        <p>Hesabınız başarıyla doğrulandı. Artık uygulamaya geri dönüp Opentum'u kullanmaya başlayabilirsiniz.</p>
        <a href="https://opentum.com.tr" class="btn">Giriş Yap</a>
    </div>
</body>
</html>
